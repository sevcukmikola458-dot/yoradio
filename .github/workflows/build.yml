name: Build ESP32 Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          pip install -U platformio
          pio pkg install

      - name: Build firmware
        run: |
          pio run
          ls -la .pio/build/esp32dev/

      - name: Extract firmware path
        id: firmware
        run: |
          FW=$(find .pio/build/esp32dev/ -name "firmware.bin")
          echo "firmware=$FW" >> $GITHUB_OUTPUT
          echo "Found firmware: $FW"

      - name: Install mkspiffs
        id: tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mkspiffs
          MK=$(which mkspiffs)
          echo "mkspiffs=$MK" >> $GITHUB_OUTPUT

      - name: Read SPIFFS partition size
        id: parts
        run: |
          SIZE=$(grep -i spiffs partitions.csv | awk -F',' '{print $4}')
          echo "spiffs_size=$SIZE" >> $GITHUB_OUTPUT
          echo "SPIFFS size: $SIZE"

      - name: Build SPIFFS image from yoRadio
        run: |
          SIZE_STR="${{ steps.parts.outputs.spiffs_size }}"
          SIZE_BYTES=$(echo "$SIZE_STR" | tr -d '\r')
          echo "SPIFFS size in bytes: $SIZE_BYTES"

          ${{ steps.tools.outputs.mkspiffs }} -c data -b "$SIZE_BYTES" yoRadio/spiffs.bin
          ls -la yoRadio/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-build
          path: |
            ${{ steps.firmware.outputs.firmware }}
            yoRadio/spiffs.bin
