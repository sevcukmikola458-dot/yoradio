name: Build yoRadio firmware (single merged .bin)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Install ESP32 core (pinned to 2.0.14)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.14

      - name: Install required libraries
        run: |
          arduino-cli lib install "OneButton"

      - name: Compile firmware (app + bootloader + partitions)
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --export-binaries \
            --build-property build.partitions=default \
            ./yoRadio

      - name: Locate build tools bundled with the ESP32 core
        id: tools
        run: |
          CORE_DIR=$(find ~/.arduino15/packages/esp32/hardware/esp32 -maxdepth 1 -mindepth 1 -type d | head -1)
          MKSPIFFS=$(find ~/.arduino15/packages/esp32/tools/mkspiffs -name "mkspiffs*" -type f | head -1)
          ESPTOOL=$(find ~/.arduino15/packages/esp32/tools/esptool_py -name "esptool*" -type f | head -1)
          GENPART=$(find "$CORE_DIR" -name "gen_esp32part.py" | head -1)

          echo "core_dir=$CORE_DIR" >> $GITHUB_OUTPUT
          echo "mkspiffs=$MKSPIFFS" >> $GITHUB_OUTPUT
          echo "esptool=$ESPTOOL" >> $GITHUB_OUTPUT
          echo "genpart=$GENPART" >> $GITHUB_OUTPUT

          chmod +x "$MKSPIFFS" "$ESPTOOL" || true

      - name: Debug build directory
        run: |
          echo "Listing yoRadio/build:"
          ls -R yoRadio/build || true

      - name: Read partition offsets from the compiled partition table
        id: parts
        run: |
          BUILD_DIR=$(find yoRadio/build -type d -name "esp32.esp32.esp32" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            BUILD_DIR=$(find yoRadio/build -maxdepth 2 -mindepth 1 -type d | head -1)
          fi

          echo "Using BUILD_DIR: $BUILD_DIR"

          python3 "${{ steps.tools.outputs.genpart }}" --verify "$BUILD_DIR"/*.partitions.bin > partitions.csv
          cat partitions.csv

          APP_OFFSET=$(grep -E "^app0|^factory" partitions.csv | head -1 | awk -F',' '{gsub(/ /,"",$4); print $4}')
          SPIFFS_OFFSET=$(grep "spiffs" partitions.csv | awk -F',' '{gsub(/ /,"",$4); print $4}')
          SPIFFS_SIZE=$(grep "spiffs" partitions.csv | awk -F',' '{gsub(/ /,"",$5); print $5}')

          echo "build_dir=$BUILD_DIR" >> $GITHUB_OUTPUT
          echo "app_offset=$APP_OFFSET" >> $GITHUB_OUTPUT
          echo "spiffs_offset=$SPIFFS_OFFSET" >> $GITHUB_OUTPUT
          echo "spiffs_size=$SPIFFS_SIZE" >> $GITHUB_OUTPUT

      - name: Build SPIFFS image from yoRadio/data
        run: |
          SIZE_STR="${{ steps.parts.outputs.spiffs_size }}"
          SIZE_BYTES=$(echo "$SIZE_STR" | sed 's/K$//' | awk '{print $1 * 1024}')
          echo "SPIFFS size in bytes: $SIZE_BYTES"

          "${{ steps.tools.outputs.mk
